// ═══════════════════════════════════════════════
// AUTH MODULE
// ═══════════════════════════════════════════════
const auth={
  async signIn(email,password){
    const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=password`,{
      method:"POST",headers:{"Content-Type":"application/json",apikey:SUPABASE_KEY},
      body:JSON.stringify({email,password})
    });
    const d=await r.json();
    if(!r.ok)throw new Error(d.error_description||d.msg||d.error||"Echec de connexion");
    localStorage.setItem("pel_session",JSON.stringify(d));
    return d;
  },
  async signOut(){
    const s=auth.getSession();
    if(s?.access_token){
      await fetch(`${SUPABASE_URL}/auth/v1/logout`,{
        method:"POST",headers:{"Content-Type":"application/json",apikey:SUPABASE_KEY,Authorization:`Bearer ${s.access_token}`}
      }).catch(()=>{});
    }
    localStorage.removeItem("pel_session");
  },
  getSession(){
    try{const s=localStorage.getItem("pel_session");return s?JSON.parse(s):null;}catch{return null;}
  },
  getToken(){
    const s=auth.getSession();
    return s?.access_token||SUPABASE_KEY;
  },
  getUser(){
    const s=auth.getSession();
    return s?.user||null;
  },
  isLoggedIn(){
    const s=auth.getSession();
    if(!s?.access_token)return false;
    if(s.expires_at&&s.expires_at*1000<Date.now())return false;
    return true;
  },
  async refreshIfNeeded(){
    const s=auth.getSession();
    if(!s?.refresh_token)return false;
    if(s.expires_at&&(s.expires_at*1000-Date.now())>300000)return true;
    try{
      const r=await fetch(`${SUPABASE_URL}/auth/v1/token?grant_type=refresh_token`,{
        method:"POST",headers:{"Content-Type":"application/json",apikey:SUPABASE_KEY},
        body:JSON.stringify({refresh_token:s.refresh_token})
      });
      if(!r.ok)throw new Error("refresh failed");
      const d=await r.json();
      localStorage.setItem("pel_session",JSON.stringify(d));
      return true;
    }catch{localStorage.removeItem("pel_session");return false;}
  }
};

// ═══════════════════════════════════════════════
// SUPABASE REST CLIENT
// ═══════════════════════════════════════════════
const createClient=()=>{
  const getHeaders=()=>({
    apikey:SUPABASE_KEY,
    Authorization:`Bearer ${auth.getToken()}`,
    "Content-Type":"application/json",
    Prefer:"return=representation",
  });
  const req=async(path,opts={})=>{
    await auth.refreshIfNeeded();
    const r=await fetch(`${SUPABASE_URL}/rest/v1/${path}`,{...opts,headers:{...getHeaders(),...opts.headers}});
    if(!r.ok){const e=await r.text();throw new Error(`${r.status}: ${e}`);}
    const t=await r.text();return t?JSON.parse(t):null;
  };
  return{
    from:(t)=>({
      select:(c="*",o={})=>({run:()=>req(`${t}?select=${c}${o.filter||""}${o.order?`&order=${o.order}`:""}`)}),
      insert:(d)=>req(t,{method:"POST",body:JSON.stringify(Array.isArray(d)?d:[d])}),
      update:(d,col,val)=>req(`${t}?${col}=eq.${val}`,{method:"PATCH",body:JSON.stringify(d)}),
      del:(col,val)=>req(`${t}?${col}=eq.${val}`,{method:"DELETE"}),
    }),
    rpc:(fn,p={})=>req(`rpc/${fn}`,{method:"POST",body:JSON.stringify(p)}),
  };
};

// ═══════════════════════════════════════════════

const Icon=({name,size=18,color="#333",style={}})=>{
  const ref=useRef(null);
  useEffect(()=>{
    if(ref.current){
      ref.current.innerHTML='';
      try{const svg=lucide.createElement(lucide.icons[name]);svg.setAttribute('width',size);svg.setAttribute('height',size);svg.setAttribute('color',color);Object.assign(svg.style,style);ref.current.appendChild(svg);}catch(e){}
    }
  },[name,size,color]);
  return <span ref={ref} style={{display:'inline-flex',alignItems:'center',justifyContent:'center',width:size,height:size,...style}}/>;
};

// LOGIN SCREEN
// ═══════════════════════════════════════════════
function LoginScreen({onLogin}){
  const [email,setEmail]=useState("");
  const [pw,setPw]=useState("");
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState("");

  const submit=async(e)=>{
    e.preventDefault();
    setLoading(true);setErr("");
    try{
      await auth.signIn(email,pw);
      onLogin();
    }catch(ex){
      setErr(ex.message==="Invalid login credentials"?"Email ou mot de passe incorrect":ex.message);
    }finally{setLoading(false);}
  };

  return(
    <div style={{minHeight:"100vh",background:`linear-gradient(135deg,${NAVY} 0%,#2D4A7A 50%,#1a3a5c 100%)`,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{background:"white",borderRadius:16,padding:40,width:420,maxWidth:"95vw",boxShadow:"0 25px 60px rgba(0,0,0,.35)",animation:"fadeIn .4s ease"}}>
        <div style={{textAlign:"center",marginBottom:32}}>
          <div style={{width:64,height:64,borderRadius:16,background:`linear-gradient(135deg,${NAVY},#2D4A7A)`,display:"inline-flex",alignItems:"center",justifyContent:"center",marginBottom:16,boxShadow:"0 4px 12px rgba(27,42,74,.3)"}}>
            <Icon name="shield" size={32} color={GOLD}/>
          </div>
          <h1 style={{margin:0,fontSize:22,color:NAVY,fontWeight:800,letterSpacing:-.5}}>PEL-USOAP Readiness</h1>
          <p style={{margin:"8px 0 0",color:"#6B7280",fontSize:13}}>DGAC Tunisie — Systeme de conformite PEL</p>
          <div style={{width:40,height:3,background:GOLD,margin:"12px auto 0",borderRadius:2}}/>
        </div>

        <form onSubmit={submit}>
          <Field label="Email" req>
            <div style={{position:"relative"}}>
              <Icon name="mail" size={16} color="#9CA3AF" style={{position:"absolute",left:12,top:10}}/>
              <input style={{...iS,paddingLeft:36}} type="email" placeholder="votre@email.com" value={email} onChange={e=>setEmail(e.target.value)} required/>
            </div>
          </Field>
          <Field label="Mot de passe" req>
            <div style={{position:"relative"}}>
              <Icon name="lock" size={16} color="#9CA3AF" style={{position:"absolute",left:12,top:10}}/>
              <input style={{...iS,paddingLeft:36}} type="password" placeholder="••••••••" value={pw} onChange={e=>setPw(e.target.value)} required/>
            </div>

          {err&&<div style={{padding:"8px 12px",background:"#FEF2F2",border:"1px solid #FEE2E2",borderRadius:6,fontSize:12,color:"#DC2626",marginBottom:14}}>{err}</div>}

function App(){
  const [logged,setLogged]=useState(auth.isLoggedIn());
  const [tab,setTab]=useState("dashboard");
  const [db,setDb]=useState(null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const [sc,setSc]=useState(window.innerWidth<768);

  const [stats,setStats]=useState(null);
  const [ceStats,setCeStats]=useState([]);
  const [pqList,setPqList]=useState([]);
  const [selPQ,setSelPQ]=useState(null);
  const [mReg,setMReg]=useState([]);
  const [mProc,setMProc]=useState([]);
  const [prvs,setPrvs]=useState([]);
  const [pqP,setPqP]=useState([]);
  const [finds,setFinds]=useState([]);
  const [caps,setCaps]=useState([]);
  const [insps,setInsps]=useState([]);
  const [forms,setForms]=useState([]);
  const [interps,setInterps]=useState([]);
  const [modal,setModal]=useState(null);
  const [filters,setFilters]=useState({ce:"",priorite:"",statut:"",search:""});

  useEffect(()=>{if(logged)setDb(createClient());},[logged]);

  const user=auth.getUser();

  const logout=async()=>{await auth.signOut();setLogged(false);setDb(null);setStats(null);setPqList([]);};

  const loadAll=useCallback(async()=>{
    if(!db)return;setLoading(true);setError(null);
    try{
      const [st,ce,pqs,mr,mp,pr,pp,fi,ca,ins,fo,it]=await Promise.all([
        db.from("v_dashboard_stats").select().run(),
        db.from("v_stats_par_ce").select().run(),
        db.from("v_fiche_pq").select().run(),
        db.from("pq_mapping_reglementaire").select().run(),
        db.from("pq_mapping_procedural").select().run(),
        db.from("preuves").select("*",{filter:"&deleted_at=is.null"}).run(),
        db.from("pq_preuves").select().run(),
        db.from("findings").select().run(),
        db.from("capa").select().run(),
        db.from("inspecteurs").select().run(),
        db.from("formations_inspecteurs").select().run(),
        db.from("pq_interpretation").select().run(),
      ]);
      setStats(st?.[0]||null);setCeStats(ce||[]);setPqList(pqs||[]);
      setMReg(mr||[]);setMProc(mp||[]);setPrvs(pr||[]);setPqP(pp||[]);
      setFinds(fi||[]);setCaps(ca||[]);setInsps(ins||[]);setForms(fo||[]);setInterps(it||[]);
    }catch(e){
      if(e.message?.includes("401")||e.message?.includes("JWT")){await logout();return;}
      setError(e.message);
    }finally{setLoading(false);}
  },[db]);

  useEffect(()=>{if(db)loadAll();},[db,loadAll]);

  const recompute=async()=>{if(!db)return;setLoading(true);try{await db.rpc("recompute_all_readiness");await loadAll();}catch(e){setError(e.message);}finally{setLoading(false);}};

  const fPQs=useMemo(()=>pqList.filter(pq=>{
    if(filters.ce&&pq.ce_principal!==filters.ce)return false;
    if(filters.priorite&&pq.priorite!==filters.priorite)return false;
    if(filters.statut&&pq.statut_readiness!==filters.statut)return false;
    if(filters.search){const s=filters.search.toLowerCase();if(!pq.pq_code.toLowerCase().includes(s)&&!(pq.libelle_fr||"").toLowerCase().includes(s)&&!(pq.libelle_en||"").toLowerCase().includes(s))return false;}
    return true;
  }),[pqList,filters]);

  if(!logged)return <LoginScreen onLogin={()=>setLogged(true)}/>;

  return(
    <div style={{display:"flex",minHeight:"100vh"}}>
      {/* Sidebar */}
      <div className="sidebar" style={{width:sc?60:240,background:NAVY,color:"white",transition:"width .2s",display:"flex",flexDirection:"column",flexShrink:0,overflow:"hidden"}}>
        <div style={{padding:sc?"16px 8px":"16px 20px",borderBottom:"1px solid rgba(255,255,255,.1)",display:"flex",alignItems:"center",gap:10,cursor:"pointer"}} onClick={()=>setSc(!sc)}>
          <Icon name="shield" size={22} color={GOLD}/>
          {!sc&&<div><div style={{fontSize:13,fontWeight:700,letterSpacing:.5}} className="lbl">PEL-USOAP</div><div style={{fontSize:10,opacity:.6}} className="lbl">DGAC Tunisie</div></div>}
        </div>
        <nav style={{flex:1,padding:"8px 0"}}>
          {TABS.map(t=>(
            <div key={t.id} onClick={()=>{setTab(t.id);setSelPQ(null);}} style={{padding:sc?"10px 0":"10px 20px",display:"flex",alignItems:"center",gap:10,cursor:"pointer",background:tab===t.id?"rgba(255,255,255,.12)":"transparent",borderLeft:tab===t.id?`3px solid ${GOLD}`:"3px solid transparent",transition:"all .15s",justifyContent:sc?"center":"flex-start"}} title={t.label}>
              <Icon name={t.icon} size={18} color={tab===t.id?GOLD:"rgba(255,255,255,.6)"}/>
              {!sc&&<span style={{fontSize:13,fontWeight:tab===t.id?600:400,opacity:tab===t.id?1:.7}} className="lbl">{t.label}</span>}
            </div>
          ))}
        </nav>
        <div style={{padding:sc?"8px":"12px 20px",borderTop:"1px solid rgba(255,255,255,.1)"}}>
          {!sc&&<div style={{fontSize:11,color:"rgba(255,255,255,.5)",marginBottom:8,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}} className="lbl">{user?.email||""}</div>}
          <div onClick={logout} style={{display:"flex",alignItems:"center",gap:8,cursor:"pointer",padding:"6px 0",opacity:.7}} title="Deconnexion">
            <Icon name="log-out" size={16} color="rgba(255,255,255,.7)"/>
            {!sc&&<span style={{fontSize:12,color:"rgba(255,255,255,.7)"}} className="lbl">Deconnexion</span>}
          </div>
        </div>
      </div>

      {/* Main Content */}
      <div style={{flex:1,overflow:"auto",background:"#F3F4F6"}}>
        <div style={{background:"white",borderBottom:"1px solid #E5E7EB",padding:"12px 24px",display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100}}>
          <div style={{display:"flex",alignItems:"center",gap:12}}>
            {selPQ&&<button onClick={()=>setSelPQ(null)} style={{...bS,padding:"6px 12px"}}><Icon name="arrow-left" size={14} color={NAVY}/> Retour</button>}
            <h2 style={{margin:0,fontSize:16,color:NAVY,fontWeight:700}}>{selPQ?`Fiche PQ — ${selPQ.pq_code}`:TABS.find(t=>t.id===tab)?.label}</h2>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            {loading&&<Icon name="refresh-cw" size={16} color={NAVY} style={{animation:"spin 1s linear infinite"}}/>}
            {error&&<span style={{fontSize:11,color:"#DC2626",maxWidth:200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{error}</span>}
            <button onClick={loadAll} style={{...bS,padding:"6px 12px"}}><Icon name="refresh-cw" size={14} color={NAVY}/> Actualiser</button>
            <button onClick={recompute} style={{...bP,padding:"6px 12px"}}><Icon name="activity" size={14} color="white"/> Scores</button>
          </div>
        </div>

        <div style={{padding:24}}>
          {selPQ?<FichePQ pq={selPQ} mReg={mReg} mProc={mProc} prvs={prvs} pqP={pqP} finds={finds} caps={caps} interps={interps} db={db} reload={loadAll} setModal={setModal}/>:
          tab==="dashboard"?<Dashboard s={stats} ce={ceStats} pqs={pqList} fi={finds} ca={caps} onPQ={pq=>{setSelPQ(pq);setTab("pq_list");}}/>:
          tab==="pq_list"?<PQList pqs={fPQs} filters={filters} setFilters={setFilters} onSel={setSelPQ}/>:
          tab==="mappings_reg"?<DataTable data={mReg} cols={[{k:"pq_id",l:"PQ",f:v=>pqList.find(p=>p.id===v)?.pq_code||"-"},{k:"texte_ref",l:"Texte"},{k:"articles_couverts",l:"Articles"},{k:"niveau_couverture",l:"Couverture",f:v=><Badge text={v} color={v==="TOTALE"?"#16A34A":v==="PARTIELLE"?"#CA8A04":"#DC2626"} small/>},{k:"statut_validation",l:"Validation",f:v=><Badge text={v} color={v==="VALIDE"?"#16A34A":"#6B7280"} small/>}]} empty="Aucun mapping reglementaire"/>:
          tab==="mappings_proc"?<DataTable data={mProc} cols={[{k:"pq_id",l:"PQ",f:v=>pqList.find(p=>p.id===v)?.pq_code||"-"},{k:"doc_reference",l:"Reference"},{k:"doc_type",l:"Type",f:v=><Badge text={v} color={NAVY} small/>},{k:"doc_titre",l:"Titre",w:250},{k:"doc_statut",l:"Statut",f:v=><Badge text={v} color={v==="APPROUVE"?"#16A34A":"#CA8A04"} small/>}]} empty="Aucun mapping procedural"/>:
          tab==="preuves"?<DataTable data={prvs} cols={[{k:"code_preuve",l:"Code"},{k:"titre",l:"Titre",w:200},{k:"type_preuve",l:"Type",f:v=><Badge text={v} color={NAVY} small/>},{k:"date_document",l:"Date"},{k:"statut",l:"Statut",f:v=><Badge text={v} color={v==="VALIDEE"?"#16A34A":v==="EXPIREE"?"#DC2626":"#CA8A04"} small/>},{k:"is_surveillance",l:"Surv.",f:v=>v?"OUI":"-"}]} empty="Aucune preuve"/>:
          tab==="findings"?<DataTable data={finds} cols={[{k:"code_finding",l:"Code"},{k:"pq_id",l:"PQ",f:v=>pqList.find(p=>p.id===v)?.pq_code||"-"},{k:"ce_concerne",l:"CE"},{k:"severite",l:"Severite",f:v=><Badge text={v} color={SEV_COL[v]} small/>},{k:"type_finding",l:"Type",f:v=><Badge text={v?.replace(/_/g," ")} color={NAVY} small/>},{k:"statut",l:"Statut",f:v=><Badge text={v} color={v==="CLOS"?"#16A34A":v==="OUVERT"?"#DC2626":"#CA8A04"} small/>}]} empty="Aucun finding"/>:
          tab==="capa"?<DataTable data={caps} cols={[{k:"code_capa",l:"Code"},{k:"finding_id",l:"Finding",f:v=>finds.find(f=>f.id===v)?.code_finding||"-"},{k:"type_capa",l:"Type",f:v=><Badge text={v} color={NAVY} small/>},{k:"statut",l:"Statut",f:v=><Badge text={v} color={v==="CLOS"||v==="VALIDE"?"#16A34A":v==="EN_RETARD"?"#DC2626":"#CA8A04"} small/>},{k:"echeance",l:"Echeance"},{k:"action_structurelle",l:"Action",w:200}]} empty="Aucun CAPA"/>:
          tab==="inspecteurs"?<InspecteursView insps={insps} forms={forms} db={db} reload={loadAll} setModal={setModal}/>:null}
        </div>
      </div>
      {modal&&<Modal title={modal.title} onClose={()=>setModal(null)}>{modal.content}</Modal>}
    </div>
  );
}

// GENERIC TABLE
// ═══════════════════════════════════════════════
function CellVal({col,row}){
  var v=row[col.k];
  if(col.f)return col.f(v);
  var s=v!=null?String(v):"-";
  return s.substring(0,60);
}

function DataTable({data,cols,empty}){
  var thStyle={padding:"10px 12px",textAlign:"left",color:"white",fontWeight:600,fontSize:11,textTransform:"uppercase",letterSpacing:.5,whiteSpace:"nowrap"};
  var tdStyle=function(c){return{padding:"8px 12px",maxWidth:c.w||200,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"};};
  return(
    <div style={{background:"white",borderRadius:8,border:"1px solid #E5E7EB",overflow:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:600}}>
        <thead>
          <tr style={{background:NAVY}}>
            {cols.map(function(c){return <th key={c.k} style={thStyle}>{c.l}</th>;})}
          </tr>
        </thead>
        <tbody>
          {data.map(function(r,i){
            var bg=i%2?"#FAFAFA":"white";
            return(
              <tr key={r.id||i} style={{background:bg,borderBottom:"1px solid #F3F4F6"}}>
                {cols.map(function(c){return <td key={c.k} style={tdStyle(c)}><CellVal col={c} row={r}/></td>;})}
              </tr>
            );
          })}
        </tbody>
      </table>
      {data.length===0&&<div style={{padding:40,textAlign:"center",color:"#9CA3AF"}}>{empty}</div>}
    </div>
  );
}

      <StatCard icon="x-circle" label="Bloques" value={s.pq_bloque} color="#DC2626"/>

    </div>
    <div className="main-grid-2" style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:20}}>
      <div style={{background:"white",borderRadius:8,border:"1px solid #E5E7EB",padding:20}}>
        <h3 style={{margin:"0 0 16px",fontSize:14,color:NAVY,fontWeight:700}}>Scores par CE</h3>
        {ce.map(c=>(<div key={c.ce_principal} style={{marginBottom:12}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}><span style={{fontSize:12,fontWeight:600,color:NAVY}}>{c.ce_principal}</span><span style={{fontSize:11,color:"#6B7280"}}>{CE_LABELS[c.ce_principal]}</span></div><div style={{display:"flex",alignItems:"center",gap:8}}><ScoreBar score={parseFloat(c.score_moyen)} h={6}/><span style={{fontSize:10,color:"#9CA3AF",whiteSpace:"nowrap"}}>{c.pq_ready}/{c.total_pq}</span></div></div>))}
      </div>
      <div style={{background:"white",borderRadius:8,border:"1px solid #E5E7EB",padding:20}}>
        <h3 style={{margin:"0 0 16px",fontSize:14,color:NAVY,fontWeight:700}}>PQ a risque critique</h3>
        {critPQs.length===0?<p style={{color:"#16A34A",fontSize:13,textAlign:"center",padding:20}}>Aucun PQ critique</p>:
        critPQs.map(pq=>(<div key={pq.id} onClick={()=>onPQ(pq)} style={{padding:"8px 12px",borderRadius:6,marginBottom:6,cursor:"pointer",border:"1px solid #FEE2E2",background:"#FEF2F2",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><span style={{fontSize:12,fontWeight:700,color:NAVY}}>{pq.pq_code}</span><span style={{fontSize:11,color:"#6B7280",marginLeft:8}}>{(pq.libelle_fr||pq.libelle_en||"").substring(0,45)}...</span></div><Badge text={`${pq.score_global??0}%`} color="#DC2626" small/></div>))}
      </div>
      <div style={{background:"white",borderRadius:8,border:"1px solid #E5E7EB",padding:20}}>
        <h3 style={{margin:"0 0 16px",fontSize:14,color:NAVY,fontWeight:700}}>Findings ouverts ({openF.length})</h3>
        {openF.slice(0,6).map(f=>(<div key={f.id} style={{padding:"6px 0",borderBottom:"1px solid #F3F4F6",display:"flex",justifyContent:"space-between"}}><div style={{display:"flex",gap:8}}><Badge text={f.severite} color={SEV_COL[f.severite]} small/><span style={{fontSize:12}}>{f.code_finding}</span></div><span style={{fontSize:11,color:"#6B7280"}}>{f.ce_concerne}</span></div>))}
        {openF.length===0&&<p style={{color:"#9CA3AF",fontSize:13,textAlign:"center"}}>Aucun</p>}
      </div>
      <div style={{background:"white",borderRadius:8,border:"1px solid #E5E7EB",padding:20}}>
        <h3 style={{margin:"0 0 16px",fontSize:14,color:NAVY,fontWeight:700}}>CAPA en retard ({lateC.length})</h3>
        {lateC.slice(0,6).map(c=>(<div key={c.id} style={{padding:"6px 0",borderBottom:"1px solid #F3F4F6",display:"flex",justifyContent:"space-between"}}><span style={{fontSize:12,fontWeight:600}}>{c.code_capa}</span><span style={{fontSize:11,color:"#DC2626"}}>Ech: {c.echeance}</span></div>))}
        {lateC.length===0&&<p style={{color:"#16A34A",fontSize:13,textAlign:"center"}}>Aucun</p>}
      </div>
    </div>
  </div>);
}

function FichePQ({pq,mReg,mProc,prvs,pqP,finds,caps,interps,db,reload,setModal}){
  const [at,setAt]=useState("overview");
  const pmr=mReg.filter(m=>m.pq_id===pq.id);
  const pmp=mProc.filter(m=>m.pq_id===pq.id);
  const ppp=pqP.filter(pp=>pp.pq_id===pq.id).map(pp=>({...pp,prv:prvs.find(p=>p.id===pp.preuve_id)})).filter(pp=>pp.prv);
  const pf=finds.filter(f=>f.pq_id===pq.id);
  const pc=caps.filter(c=>pf.some(f=>f.id===c.finding_id));
  const interp=interps.find(i=>i.pq_id===pq.id);
  const al=pq.alertes?typeof pq.alertes==="string"?JSON.parse(pq.alertes):pq.alertes:[];
  const uid=auth.getUser()?.id||"00000000-0000-0000-0000-000000000000";
  const tabs=[{id:"overview",l:"Vue d'ensemble",ic:"eye"},{id:"reg",l:"Reglementaire",ic:"book-open",n:pmr.length},{id:"proc",l:"Procedural",ic:"clipboard",n:pmp.length},{id:"preuves",l:"Preuves",ic:"folder-open",n:ppp.length},{id:"findings",l:"Findings",ic:"alert-triangle",n:pf.length},{id:"capa",l:"CAPA",ic:"target",n:pc.length},{id:"strat",l:"Strategie",ic:"award"}];

  const addMP=()=>{const F=()=>{const [d,sD]=useState({doc_type:"PROCEDURE",doc_reference:"",doc_titre:"",doc_version:"",doc_statut:"APPROUVE",sections_applicables:"",statut_validation:"BROUILLON"});const [sv,sSv]=useState(false);const save=async()=>{sSv(true);try{await db.from("pq_mapping_procedural").insert({...d,pq_id:pq.id,updated_by:uid});setModal(null);await reload();}catch(e){alert(e.message);}finally{sSv(false);}};return(<div><Field label="Type"><select style={sS} value={d.doc_type} onChange={e=>sD(x=>({...x,doc_type:e.target.value}))}>{["PROCEDURE","GUIDE","CHECKLIST","FORMULAIRE","INSTRUCTION"].map(t=><option key={t} value={t}>{t}</option>)}</select></Field><Field label="Reference" req><input style={iS} value={d.doc_reference} onChange={e=>sD(x=>({...x,doc_reference:e.target.value}))}/></Field><Field label="Titre" req><input style={iS} value={d.doc_titre} onChange={e=>sD(x=>({...x,doc_titre:e.target.value}))}/></Field><Field label="Version"><input style={iS} value={d.doc_version} onChange={e=>sD(x=>({...x,doc_version:e.target.value}))}/></Field><Field label="Statut"><select style={sS} value={d.doc_statut} onChange={e=>sD(x=>({...x,doc_statut:e.target.value}))}>{["APPROUVE","EN_REVISION","PROJET","ABROGE"].map(s=><option key={s} value={s}>{s}</option>)}</select></Field><Field label="Sections"><input style={iS} value={d.sections_applicables} onChange={e=>sD(x=>({...x,sections_applicables:e.target.value}))}/></Field><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}><button onClick={()=>setModal(null)} style={bS}>Annuler</button><button onClick={save} style={bP} disabled={sv||!d.doc_reference||!d.doc_titre}>{sv?"...":"Enregistrer"}</button></div></div>);};setModal({title:"Nouveau mapping procedural",content:<F/>});};

  const addPrv=()=>{const F=()=>{const [d,sD]=useState({code_preuve:`PRV-PEL-${String(Date.now()).slice(-4)}`,titre:"",type_preuve:"DOC_REGLEMENTAIRE",date_document:new Date().toISOString().split("T")[0],is_surveillance:false,role_preuve:"PRINCIPALE"});const [sv,sSv]=useState(false);const save=async()=>{sSv(true);try{const[prv]=await db.from("preuves").insert({code_preuve:d.code_preuve,titre:d.titre,type_preuve:d.type_preuve,date_document:d.date_document,is_surveillance:d.is_surveillance,deposee_par:uid});if(prv?.id)await db.from("pq_preuves").insert({pq_id:pq.id,preuve_id:prv.id,role_preuve:d.role_preuve,created_by:uid});setModal(null);await reload();}catch(e){alert(e.message);}finally{sSv(false);}};return(<div><Field label="Code" req><input style={iS} value={d.code_preuve} onChange={e=>sD(x=>({...x,code_preuve:e.target.value}))}/></Field><Field label="Titre" req><input style={iS} value={d.titre} onChange={e=>sD(x=>({...x,titre:e.target.value}))}/></Field><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Field label="Type"><select style={sS} value={d.type_preuve} onChange={e=>sD(x=>({...x,type_preuve:e.target.value}))}>{["DOC_REGLEMENTAIRE","RAPPORT_INSPECTION","PV","REGISTRE","ECHANTILLON","CAPTURE","CORRESPONDANCE","CERTIFICAT","AUTRE"].map(t=><option key={t} value={t}>{t}</option>)}</select></Field><Field label="Role"><select style={sS} value={d.role_preuve} onChange={e=>sD(x=>({...x,role_preuve:e.target.value}))}>{["PRINCIPALE","COMPLEMENTAIRE","ECHANTILLON","SURVEILLANCE"].map(r=><option key={r} value={r}>{r}</option>)}</select></Field></div><Field label="Date"><input type="date" style={iS} value={d.date_document} onChange={e=>sD(x=>({...x,date_document:e.target.value}))}/></Field><label style={{display:"flex",alignItems:"center",gap:8,fontSize:12,cursor:"pointer",marginTop:8}}><input type="checkbox" checked={d.is_surveillance} onChange={e=>sD(x=>({...x,is_surveillance:e.target.checked}))}/> Preuve de surveillance</label><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}><button onClick={()=>setModal(null)} style={bS}>Annuler</button><button onClick={save} style={bP} disabled={sv||!d.titre}>{sv?"...":"Enregistrer"}</button></div></div>);};setModal({title:"Nouvelle preuve",content:<F/>});};

  const addFnd=()=>{const F=()=>{const [d,sD]=useState({code_finding:`FND-PEL-${String(Date.now()).slice(-4)}`,type_finding:"GAP_REGLEMENTAIRE",severite:"MAJEUR",description:"",source_detection:"REVUE_INTERNE"});const [sv,sSv]=useState(false);const save=async()=>{sSv(true);try{await db.from("findings").insert({...d,pq_id:pq.id,ce_concerne:pq.ce_principal,detecte_par:uid,responsable:uid});setModal(null);await reload();}catch(e){alert(e.message);}finally{sSv(false);}};return(<div><Field label="Code" req><input style={iS} value={d.code_finding} onChange={e=>sD(x=>({...x,code_finding:e.target.value}))}/></Field><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}><Field label="Type"><select style={sS} value={d.type_finding} onChange={e=>sD(x=>({...x,type_finding:e.target.value}))}>{["GAP_REGLEMENTAIRE","GAP_PROCEDURAL","GAP_IMPLEMENTATION","GAP_SURVEILLANCE","INCOHERENCE"].map(t=><option key={t} value={t}>{t.replace(/_/g," ")}</option>)}</select></Field><Field label="Severite"><select style={sS} value={d.severite} onChange={e=>sD(x=>({...x,severite:e.target.value}))}>{["BLOQUANT","MAJEUR","MINEUR","OBSERVATION"].map(s=><option key={s} value={s}>{s}</option>)}</select></Field></div><Field label="Description" req><textarea style={{...iS,minHeight:80}} value={d.description} onChange={e=>sD(x=>({...x,description:e.target.value}))}/></Field><Field label="Source"><select style={sS} value={d.source_detection} onChange={e=>sD(x=>({...x,source_detection:e.target.value}))}>{["REVUE_INTERNE","PRE_AUDIT","MOCK_AUDIT","AUTO_EVALUATION","CONTROLE_AUTO"].map(s=><option key={s} value={s}>{s.replace(/_/g," ")}</option>)}</select></Field><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}><button onClick={()=>setModal(null)} style={bS}>Annuler</button><button onClick={save} style={bP} disabled={sv||!d.description}>{sv?"...":"Enregistrer"}</button></div></div>);};setModal({title:"Nouveau finding",content:<F/>});};

  return(<div>
    <div style={{background:"white",borderRadius:8,border:"1px solid #E5E7EB",padding:20,marginBottom:16}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",flexWrap:"wrap",gap:12}}>
        <div style={{flex:1,minWidth:250}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}><Badge text={pq.ce_principal} color={NAVY}/><Badge text={pq.priorite} color={PRIO_COL[pq.priorite]}/><Badge text={(pq.statut_readiness||"NON_TRAITE").replace(/_/g," ")} color={STAT_COL[pq.statut_readiness||"NON_TRAITE"]}/>{pq.niveau_risque&&<Badge text={`Risque ${pq.niveau_risque}`} color={RISK_COL[pq.niveau_risque]}/>}</div>
          <p style={{margin:"8px 0 4px",fontSize:12,color:"#6B7280",lineHeight:1.5}}>{pq.libelle_en}</p>
          {pq.libelle_fr&&<p style={{margin:"4px 0 0",fontSize:12,color:NAVY,fontStyle:"italic",lineHeight:1.5}}>{pq.libelle_fr}</p>}
        </div>
        <div style={{textAlign:"center",minWidth:80}}><div style={{fontSize:36,fontWeight:800,color:(pq.score_global||0)>=70?"#16A34A":(pq.score_global||0)>=50?"#CA8A04":"#DC2626"}}>{pq.score_global?.toFixed?.(1)??"0.0"}</div><div style={{fontSize:10,color:"#9CA3AF",textTransform:"uppercase"}}>Score</div></div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(100px,1fr))",gap:12,marginTop:16,padding:12,background:"#F9FAFB",borderRadius:6}}>
        {[{l:"Base legale",s:pq.score_base_legale,w:"30%"},{l:"Procedure",s:pq.score_procedure,w:"20%"},{l:"Implementation",s:pq.score_implementation,w:"20%"},{l:"Surveillance",s:pq.score_surveillance,w:"20%"},{l:"Tracabilite",s:pq.score_tracabilite,w:"10%"}].map(c=>(<div key={c.l} style={{textAlign:"center"}}><div style={{fontSize:10,color:"#6B7280",marginBottom:4}}>{c.l} ({c.w})</div><ScoreBar score={parseFloat(c.s||0)} h={6}/></div>))}
      </div>
      {al.length>0&&<div style={{marginTop:12,padding:10,background:"#FEF2F2",borderRadius:6,border:"1px solid #FEE2E2"}}><div style={{fontSize:11,fontWeight:600,color:"#DC2626",marginBottom:4}}>Alertes :</div>{al.map((a,i)=><div key={i} style={{fontSize:11,color:"#991B1B"}}>{a.code} — {a.msg}</div>)}</div>}
    </div>

    <div style={{display:"flex",gap:2,marginBottom:16,background:"white",borderRadius:8,border:"1px solid #E5E7EB",padding:4,flexWrap:"wrap"}}>
      {tabs.map(t=>(<button key={t.id} onClick={()=>setAt(t.id)} style={{padding:"8px 10px",borderRadius:6,border:"none",cursor:"pointer",background:at===t.id?NAVY:"transparent",color:at===t.id?"white":"#6B7280",fontSize:11,fontWeight:600,display:"flex",alignItems:"center",gap:5,transition:"all .15s"}}><Icon name={t.ic} size={13} color={at===t.id?"white":"#6B7280"}/> {t.l}{t.n!==undefined&&<span style={{background:at===t.id?"rgba(255,255,255,.2)":"#E5E7EB",padding:"0 5px",borderRadius:10,fontSize:10}}>{t.n}</span>}</button>))}
    </div>

    <div style={{background:"white",borderRadius:8,border:"1px solid #E5E7EB",padding:20}}>
      {at==="overview"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}><div><h4 style={{color:NAVY,fontSize:13,fontWeight:700,marginBottom:8}}>Informations</h4><div style={{fontSize:12,lineHeight:2}}><div><strong>SARPs :</strong> {(pq.sarps_refs||[]).join(", ")||"-"}</div><div><strong>PANS :</strong> {(pq.pans_refs||[]).join(", ")||"-"}</div><div><strong>Mappings reg. :</strong> {pq.nb_mappings_reg||0}</div><div><strong>Mappings proc. :</strong> {pq.nb_mappings_proc||0}</div></div></div><div><h4 style={{color:NAVY,fontSize:13,fontWeight:700,marginBottom:8}}>Etat</h4><div style={{fontSize:12,lineHeight:2}}><div><strong>Preuves :</strong> {pq.nb_preuves||0}</div><div><strong>Findings :</strong> {pq.nb_findings_ouverts||0}</div><div><strong>CAPA retard :</strong> {pq.nb_capa_retard||0}</div></div></div></div>}

      {at==="reg"&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><h4 style={{margin:0,color:NAVY,fontSize:13,fontWeight:700}}>Mappings ({pmr.length})</h4><button onClick={addMR} style={{...bP,padding:"6px 14px"}}><Icon name="plus" size={14} color="white"/> Ajouter</button></div>{pmr.map(m=><div key={m.id} style={{padding:14,border:"1px solid #E5E7EB",borderRadius:6,marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}}><span style={{fontSize:13,fontWeight:700,color:NAVY}}>{m.texte_ref}</span><div style={{display:"flex",gap:6}}><Badge text={m.niveau_couverture} color={m.niveau_couverture==="TOTALE"?"#16A34A":m.niveau_couverture==="PARTIELLE"?"#CA8A04":"#DC2626"} small/><Badge text={m.statut_validation} color={m.statut_validation==="VALIDE"?"#16A34A":"#6B7280"} small/></div></div><div style={{fontSize:12}}>{m.texte_titre}</div><div style={{fontSize:11,color:"#6B7280",marginTop:4}}>Articles : {m.articles_couverts||"-"}</div>{m.commentaire_gap&&<div style={{fontSize:11,color:"#CA8A04",marginTop:4}}>Gap : {m.commentaire_gap}</div>}</div>)}{pmr.length===0&&<div style={{padding:30,textAlign:"center",color:"#DC2626"}}>Aucun mapping — Alerte RQ-01</div>}</div>}

      {at==="proc"&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><h4 style={{margin:0,color:NAVY,fontSize:13,fontWeight:700}}>Procedures ({pmp.length})</h4><button onClick={addMP} style={{...bP,padding:"6px 14px"}}><Icon name="plus" size={14} color="white"/> Ajouter</button></div>{pmp.map(m=><div key={m.id} style={{padding:14,border:"1px solid #E5E7EB",borderRadius:6,marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}}><span style={{fontSize:13,fontWeight:700,color:NAVY}}>{m.doc_reference}</span><div style={{display:"flex",gap:6}}><Badge text={m.doc_type} color={NAVY} small/><Badge text={m.doc_statut} color={m.doc_statut==="APPROUVE"?"#16A34A":"#CA8A04"} small/></div></div><div style={{fontSize:12}}>{m.doc_titre}</div></div>)}{pmp.length===0&&<div style={{padding:30,textAlign:"center",color:"#DC2626"}}>Aucune procedure — Alerte RQ-05</div>}</div>}

      {at==="preuves"&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><h4 style={{margin:0,color:NAVY,fontSize:13,fontWeight:700}}>Preuves ({ppp.length})</h4><button onClick={addPrv} style={{...bP,padding:"6px 14px"}}><Icon name="plus" size={14} color="white"/> Ajouter</button></div>{ppp.map(pp=><div key={pp.id} style={{padding:14,border:"1px solid #E5E7EB",borderRadius:6,marginBottom:10,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8}}><div><div style={{display:"flex",gap:8,marginBottom:4}}><span style={{fontSize:12,fontWeight:700,color:NAVY}}>{pp.prv?.code_preuve}</span><Badge text={pp.role_preuve} color={pp.role_preuve==="SURVEILLANCE"?"#8B5CF6":NAVY} small/></div><div style={{fontSize:12}}>{pp.prv?.titre}</div><div style={{fontSize:11,color:"#6B7280",marginTop:2}}>{pp.prv?.type_preuve} — {pp.prv?.date_document}</div></div><Badge text={pp.prv?.statut} color={pp.prv?.statut==="VALIDEE"?"#16A34A":pp.prv?.statut==="EXPIREE"?"#DC2626":"#CA8A04"}/></div>)}{ppp.length===0&&<div style={{padding:30,textAlign:"center",color:"#DC2626"}}>Aucune preuve — Alerte RQ-07</div>}</div>}

      {at==="findings"&&<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><h4 style={{margin:0,color:NAVY,fontSize:13,fontWeight:700}}>Findings ({pf.length})</h4><button onClick={addFnd} style={{...bP,padding:"6px 14px"}}><Icon name="plus" size={14} color="white"/> Nouveau</button></div>{pf.map(f=><div key={f.id} style={{padding:14,border:"1px solid #E5E7EB",borderRadius:6,marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6,flexWrap:"wrap",gap:4}}><span style={{fontSize:13,fontWeight:700,color:NAVY}}>{f.code_finding}</span><div style={{display:"flex",gap:6}}><Badge text={f.severite} color={SEV_COL[f.severite]} small/><Badge text={f.statut} color={f.statut==="CLOS"?"#16A34A":f.statut==="OUVERT"?"#DC2626":"#CA8A04"} small/></div></div><div style={{fontSize:12}}>{f.description}</div><div style={{fontSize:11,color:"#6B7280",marginTop:4}}>{f.detecte_le} — {f.source_detection}</div></div>)}{pf.length===0&&<div style={{padding:30,textAlign:"center",color:"#9CA3AF"}}>Aucun finding</div>}</div>}

      {at==="capa"&&<div><h4 style={{margin:"0 0 16px",color:NAVY,fontSize:13,fontWeight:700}}>CAPA ({pc.length})</h4>{pc.map(c=><div key={c.id} style={{padding:14,border:"1px solid #E5E7EB",borderRadius:6,marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}><span style={{fontSize:13,fontWeight:700,color:NAVY}}>{c.code_capa}</span><Badge text={c.statut} color={c.statut==="CLOS"||c.statut==="VALIDE"?"#16A34A":c.statut==="EN_RETARD"?"#DC2626":"#CA8A04"} small/></div><div style={{fontSize:12}}><strong>Action :</strong> {c.action_structurelle}</div><div style={{fontSize:11,color:"#6B7280",marginTop:4}}>Echeance : {c.echeance}</div></div>)}{pc.length===0&&<div style={{padding:30,textAlign:"center",color:"#9CA3AF"}}>Aucun CAPA</div>}</div>}

      {at==="strat"&&<div style={{fontSize:12,lineHeight:1.8,color:"#374151"}}><div style={{marginBottom:12}}><strong>Interpretation :</strong><br/>{interp?.interpretation_fr||"Non renseignee"}</div><div style={{marginBottom:12}}><strong>Points d'attention :</strong><br/>{interp?.points_attention||"-"}</div><div style={{marginBottom:12}}><strong>Strategie :</strong><br/>{interp?.strategie_reponse||"-"}</div><div><strong>Mots-cles :</strong> {(interp?.keywords_audit||[]).join(", ")||"-"}</div></div>}
    </div>
  </div>);
}

// ═══════════════════════════════════════════════
// INSPECTEURS
// ═══════════════════════════════════════════════
function InspecteursView({insps,forms,db,reload,setModal}){
  const addI=()=>{const F=()=>{const [d,sD]=useState({nom_complet:"",matricule:"",fonction:"INSPECTEUR",domaines_designation:"PEL",date_designation:new Date().toISOString().split("T")[0]});const [sv,sSv]=useState(false);const save=async()=>{sSv(true);try{await db.from("inspecteurs").insert({...d,domaines_designation:`{${d.domaines_designation}}`});setModal(null);await reload();}catch(e){alert(e.message);}finally{sSv(false);}};return(<div><Field label="Nom" req><input style={iS} value={d.nom_complet} onChange={e=>sD(x=>({...x,nom_complet:e.target.value}))}/></Field><Field label="Matricule" req><input style={iS} value={d.matricule} onChange={e=>sD(x=>({...x,matricule:e.target.value}))}/></Field><Field label="Fonction"><select style={sS} value={d.fonction} onChange={e=>sD(x=>({...x,fonction:e.target.value}))}>{["INSPECTEUR","EXAMINATEUR","INSPECTEUR_EN_CHEF"].map(f=><option key={f} value={f}>{f}</option>)}</select></Field><Field label="Domaines"><input style={iS} value={d.domaines_designation} onChange={e=>sD(x=>({...x,domaines_designation:e.target.value}))}/></Field><Field label="Date designation"><input type="date" style={iS} value={d.date_designation} onChange={e=>sD(x=>({...x,date_designation:e.target.value}))}/></Field><div style={{display:"flex",gap:8,justifyContent:"flex-end",marginTop:16}}><button onClick={()=>setModal(null)} style={bS}>Annuler</button><button onClick={save} style={bP} disabled={sv||!d.nom_complet||!d.matricule}>{sv?"...":"Enregistrer"}</button></div></div>);};setModal({title:"Nouvel inspecteur",content:<F/>});};
  return(<div><div style={{display:"flex",justifyContent:"space-between",marginBottom:16}}><span style={{fontSize:13,color:"#6B7280"}}>{insps.length} inspecteur(s)</span><button onClick={addI} style={{...bP,padding:"8px 16px"}}><Icon name="plus" size={14} color="white"/> Ajouter</button></div><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:14}}>{insps.map(i=>{const fi=forms.filter(f=>f.inspecteur_id===i.id);return(<div key={i.id} style={{background:"white",borderRadius:8,border:"1px solid #E5E7EB",padding:16}}><div style={{display:"flex",justifyContent:"space-between"}}><div><div style={{fontSize:14,fontWeight:700,color:NAVY}}>{i.nom_complet}</div><div style={{fontSize:12,color:"#6B7280"}}>{i.matricule} — {i.fonction}</div></div><Badge text={i.actif?"ACTIF":"INACTIF"} color={i.actif?"#16A34A":"#DC2626"} small/></div><div style={{marginTop:10,fontSize:11,color:"#374151",lineHeight:1.8}}><div>Domaines : {(i.domaines_designation||[]).join(", ")}</div><div>Designation : {i.date_designation}</div><div>Formations : {fi.length}</div></div></div>);})}</div>{insps.length===0&&<div style={{padding:60,textAlign:"center",color:"#DC2626",background:"white",borderRadius:8,border:"1px solid #E5E7EB"}}>Aucun inspecteur — Alerte RQ-16</div>}</div>);
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
